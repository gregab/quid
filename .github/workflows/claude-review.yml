name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR against the project's CLAUDE.md standards.

            Steps:
            1. Run `gh pr diff $PR_NUMBER` to see the changes
            2. Read CLAUDE.md for project standards
            3. Analyze the diff for any issues

            **Hard blockers (request changes):**
            - Missing tests for new behavior or bug fixes
            - Security issues: missing auth checks, RLS bypasses, SQL injection, XSS
            - Incorrect money handling (floats instead of cents)
            - Business logic that should be in @aviary/shared but isn't
            - TypeScript `any` types
            - Missing `await params` in Next.js 16 route handlers
            - Breaking API changes without migration
            - Missing database migration for schema changes

            **Approve with comments (non-blocking):**
            - Minor naming or style suggestions
            - Simplification opportunities
            - Non-critical edge cases

            After reviewing, post your verdict using ONE of:
            - `gh pr review $PR_NUMBER --approve --body "your review"` (if no hard blockers)
            - `gh pr review $PR_NUMBER --request-changes --body "your review"` (if hard blockers found)

            Be concise. One round of feedback — catch everything the first time.
            Don't nitpick style if the logic is correct.
            Don't request changes beyond the PR's scope.
          claude_args: "--max-turns 10"
